# H2 - banco de dados em arquivo (persiste entre restarts)
spring.datasource.url=jdbc:h2:file:./data/dicasa-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console H2 para desenvolvimento (acesse: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta do servidor
server.port=8080

# Upload de arquivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson - nao falhar em propriedades desconhecidas
spring.jackson.deserialization.fail-on-unknown-properties=false

# Google Maps (opcional)
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
